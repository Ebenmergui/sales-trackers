<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Agent Commission Tracker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

:root{
  --bg:#0B1420;
  --surface:#121C2B;
  --surface-2:#1A2740;
  --border:#23324A;
  --text:#E7ECF3;
  --text-muted:#8496B0;
  --accent:#33D6A6;
  --accent-dim:#1E5C4B;
  --amber:#FFB35C;
  --blue:#6C8CFF;
  --danger:#FF6B6B;
  --radius:10px;
}
*{box-sizing:border-box;}
body{margin:0;background:transparent;color:var(--text);font-family:'Inter',sans-serif;font-size:14px;}
#app{max-width:1080px;margin:0 auto;padding:20px;}

h1,h2,h3{font-family:'Space Grotesk',sans-serif;margin:0;}
.mono{font-family:'JetBrains Mono',monospace;}

header.top{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
header.top h1{font-size:22px;letter-spacing:-0.02em;}
header.top .sub{color:var(--text-muted);font-size:12.5px;margin-top:3px;}

.team-badge{display:inline-flex;align-items:center;gap:6px;background:var(--surface-2);border:1px solid var(--accent-dim);color:var(--accent);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600;letter-spacing:.02em;}
.team-badge .pulse{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 3px rgba(51,214,166,0.18);}

.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;}
.stat .label{color:var(--text-muted);font-size:11px;text-transform:uppercase;letter-spacing:.06em;}
.stat .value{font-family:'Space Grotesk',sans-serif;font-size:24px;margin-top:4px;color:var(--accent);}
.stat .value.amber{color:var(--amber);}
.stat .value.blue{color:var(--blue);}

section.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:16px;}
section.card h2{font-size:15px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
section.card h2 .tag{font-size:11px;color:var(--text-muted);font-weight:400;font-family:'Inter';}

.btn{background:var(--accent);color:#06231b;border:none;border-radius:8px;padding:9px 16px;font-weight:600;font-size:13px;cursor:pointer;font-family:'Inter';}
.btn:hover{filter:brightness(1.08);}
.btn.secondary{background:var(--surface-2);color:var(--text);border:1px solid var(--border);}
.btn.small{padding:5px 10px;font-size:12px;}

/* Settings (unused in agent view) */

.report-controls{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap;}
.report-controls input[type=date]{background:var(--surface-2);border:1px solid var(--border);border-radius:7px;color:var(--text);padding:7px 9px;font-size:13px;}

.report-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.breakdown h3{font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;}
.bd-row{display:flex;flex-direction:row;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid var(--border);gap:8px;}
.bd-row:last-child{border-bottom:none;}
.bd-row span.n{color:var(--accent);font-family:'JetBrains Mono',monospace;white-space:nowrap;}

.person-row{border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:8px;background:var(--surface-2);}
.person-row .p-top{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;}
.person-row .p-name{font-weight:600;font-size:14px;}
.person-row .p-amt{font-family:'JetBrains Mono',monospace;color:var(--accent);font-size:15px;}
.person-row .p-sub{font-size:11.5px;color:var(--text-muted);margin-top:5px;}

.empty{color:var(--text-muted);font-size:13px;text-align:center;padding:24px 0;}
.sync-note{font-size:11px;color:var(--text-muted);}

@media(max-width:680px){
  .stats-bar{grid-template-columns:repeat(2,1fr);}
  .report-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div id="app">

  <header class="top">
    <div>
      <h1>Agent Commission Tracker</h1>
      <div class="sub">Your commission at a glance &middot; <span class="team-badge"><span class="pulse"></span>Live from the sales log</span></div>
    </div>
    <div id="loadState" class="sub">Loading…</div>
  </header>

  <div class="stats-bar" id="statsBar"></div>

  <section class="card">
    <h2>Filter <span class="tag">optional &mdash; narrow the reports below to just your name</span></h2>
    <div class="report-controls">
      <select id="agentFilter" style="background:var(--surface-2);border:1px solid var(--border);border-radius:7px;color:var(--text);padding:7px 9px;font-size:13px;">
        <option value="">Show everyone</option>
      </select>
      <button class="btn secondary small" onclick="refreshFromTeam()">Refresh (pull latest sales)</button>
    </div>
  </section>

  <section class="card">
    <h2>Daily commission report</h2>
    <div class="report-controls">
      <input type="date" id="reportDate">
      <button class="btn secondary small" onclick="setReportToday()">Today</button>
      <button class="btn secondary small" id="copyReportBtn" onclick="copyReport('day')">Copy report as text</button>
    </div>
    <div id="reportContent"></div>
  </section>

  <section class="card">
    <h2>Weekly commission report <span class="tag" id="weekRangeTag"></span></h2>
    <div class="report-controls">
      <input type="date" id="weekAnchor">
      <button class="btn secondary small" onclick="setWeekThisWeek()">This week</button>
      <button class="btn secondary small" id="copyWeeklyBtn" onclick="copyReport('week')">Copy report as text</button>
    </div>
    <div id="weeklyReportContent"></div>
  </section>

  <section class="card">
    <h2>Monthly commission report</h2>
    <div class="report-controls">
      <input type="month" id="monthPicker">
      <button class="btn secondary small" onclick="setMonthThisMonth()">This month</button>
      <button class="btn secondary small" id="copyMonthlyBtn" onclick="copyReport('month')">Copy report as text</button>
    </div>
    <div id="monthlyReportContent"></div>
  </section>

</div>

<script>
// Same backend as the Team Sales Tracker — this artifact only ever READS sales (action=list),
// it never writes back to the sales sheet.
const API_URL = 'https://script.google.com/macros/s/AKfycbw8T45gynFK9EZbEB_8204n14Ff9XRACPollLwW85FWWmG4kbGnGq5cJlcItdG0seEk/exec';
const API_KEY = 'miami123';

// Agent commission per unit — the take-home rate agents are paid, already netted down
// from the full commission. Update this table any time rates change.
const AGENT_RATES = {
  '5G 100M': 87.40,
  '5G 200M': 110.40,
  'FiOS 300M': 105.80,
  'FiOS 500M': 156.40,
  'FiOS 1G': 202.40,
  'FiOS 2G': 202.40,
  'One Talk': 27.60,
  'One Talk Mobile App': 9.20,
  'MyBiz line': 27.60,
  'Smartphone Device (iPhone, Samsung, etc)': 27.60,
  '4G 25M': 110.40,
  'BDV Winback': 47.84,
  'BDV New': 23.92
};

// Closer / fronter split applied on top of the agent rate above when a sale has both.
const SPLIT_CLOSER_PCT = 50;

let sales = [];
let settings = { splitCloserPct: SPLIT_CLOSER_PCT, rates: AGENT_RATES };
let isLoadingSales = false;

function todayStr(){ return new Date().toISOString().slice(0,10); }

function escapeHtml(str){
  if(!str) return '';
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function fmtMoney(n){
  return '$' + (Math.round((n + Number.EPSILON) * 100) / 100).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function getQty(s){
  const src = `${s.notes||''} ${s.units||''}`;
  const m = src.match(/(\d+)\s*x\b/i);
  return m ? parseInt(m[1], 10) : 1;
}

function unitTypeOf(s){
  return s.units && s.units.trim() ? s.units.trim() : 'Unspecified';
}

// ---------- Product recognition (handles naming variants + reads the notes field) ----------
const PRODUCT_ALIASES = {
  '5G 100M': ['5g 100m'],
  '5G 200M': ['5g 200m'],
  'FiOS 300M': ['fios 300m'],
  'FiOS 500M': ['fios 500m'],
  'FiOS 1G': ['fios 1g'],
  'FiOS 2G': ['fios 2g'],
  'One Talk': ['one talk', 'onetalk'],
  'One Talk Mobile App': ['one talk mobile app', 'onetalk mobile app', 'one talk mobile', 'onetalk mobile'],
  'MyBiz line': ['mybiz line', 'mybiz'],
  'Smartphone Device (iPhone, Samsung, etc)': ['smartphone', 'iphone', 'samsung'],
  '4G 25M': ['4g 25m'],
  'BDV New': ['bdv new'],
  'BDV Winback': ['bdv winback', 'bdv wb', 'bdv win back']
};

function normalizeProductText(str){
  if(!str) return '';
  let s = String(str).toLowerCase();
  s = s.replace(/(\d+)\s*mbps\b/g, '$1m');     // "200mbps" -> "200m"
  s = s.replace(/(\d+)\s*gbps\b/g, '$1g');     // "1gbps" -> "1g"
  s = s.replace(/(\d)\s*x\b/g, '$1 x ');       // "3x" -> "3 x " so it tokenizes separately
  s = s.replace(/\bx\s*(\d)/g, ' x $1');       // "x2" -> " x 2"
  s = s.replace(/[^a-z0-9]+/g, ' ');           // strip punctuation
  s = s.replace(/\bmy\s*biz\b/g, 'mybiz');     // "My biz" / "My Biz" -> "mybiz"
  s = s.replace(/\bbvd\b/g, 'bdv');           // "BVD" -> "BDV" (interchangeable abbreviation)
  s = s.replace(/\b(\d+)000\s*m\b/g, '$1g');   // 1000M -> 1G, 2000M -> 2G, etc.
  s = s.replace(/\s+/g, ' ').trim();
  return s;
}

function matchProductInSegment(norm){
  let best = null;
  Object.entries(PRODUCT_ALIASES).forEach(([key, aliases]) => {
    aliases.forEach(alias => {
      const escaped = alias.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      const re = new RegExp(`\\b${escaped}s?\\b`);
      const m = re.exec(norm);
      if(m && (!best || alias.length > best.aliasLen)){
        best = { key, start: m.index, end: m.index + m[0].length, aliasLen: alias.length };
      }
    });
  });
  return best;
}

function findProductMentions(rawText){
  if(!rawText) return [];
  const segments = String(rawText).split(/[,;\n]+|\s\+\s|\s+and\s+/i).map(seg=>seg.trim()).filter(Boolean);
  const found = [];
  segments.forEach(seg=>{
    const norm = normalizeProductText(seg);
    if(!norm) return;
    const match = matchProductInSegment(norm);
    if(!match) return;
    const remainder = (norm.slice(0, match.start) + ' ' + norm.slice(match.end)).trim();
    const qtyMatch = remainder.match(/\b(\d{1,2})\b/);
    const qty = qtyMatch ? parseInt(qtyMatch[1], 10) : 1;
    found.push({ type: match.key, qty });
  });
  return found;
}

function hasFronter(s){
  const f = (s.fronters || '').trim().toLowerCase();
  const c = (s.closers || '').trim().toLowerCase();
  if(!f || f === 'none') return false;
  if(f === c) return false; // same person as closer and fronter — treat as closer only
  return true;
}

// ---------- Load sales (read-only) ----------

async function loadSales(showLoading = true){
  if(isLoadingSales) return;
  isLoadingSales = true;
  const loadState = document.getElementById('loadState');
  if(showLoading && loadState) loadState.textContent = 'Loading…';

  try{
    const url = `${API_URL}?action=list&key=${encodeURIComponent(API_KEY)}&_=${Date.now()}`;
    const response = await fetch(url, { method:'GET', redirect:'follow', cache:'no-store' });
    if(!response.ok) throw new Error(`HTTP ${response.status}`);
    const data = await response.json();
    if(!data.success) throw new Error(data.error || 'Could not load sales');
    sales = Array.isArray(data.sales) ? data.sales : [];
    if(loadState) loadState.textContent = '';
    populateAgentFilter();
    render();
  }catch(error){
    console.error('Load failed:', error);
    if(loadState) loadState.textContent = `Load failed: ${error.message}`;
  }finally{
    isLoadingSales = false;
  }
}

async function refreshFromTeam(){
  await loadSales(true);
}

// ---------- Settings ----------
// Rates and split are hardcoded above (AGENT_RATES / SPLIT_CLOSER_PCT) — no external
// storage dependency, so this view always works regardless of the private tracker.

function populateAgentFilter(){
  const sel = document.getElementById('agentFilter');
  if(!sel) return;
  const current = sel.value;
  const names = new Set();
  sales.forEach(s=>{
    if(s.closers) names.add(s.closers.trim());
    if(s.fronters && s.fronters.trim().toLowerCase() !== 'none') names.add(s.fronters.trim());
  });
  const sorted = Array.from(names).filter(Boolean).sort();
  sel.innerHTML = '<option value="">Show everyone</option>' + sorted.map(n=>`<option value="${escapeHtml(n)}">${escapeHtml(n)}</option>`).join('');
  sel.value = current;
}

function agentFilterName(){
  const sel = document.getElementById('agentFilter');
  return sel ? sel.value : '';
}

function filterForAgent(entries){
  const name = agentFilterName();
  if(!name) return entries;
  const lower = name.toLowerCase();
  return entries.filter(s => (s.closers||'').trim().toLowerCase() === lower || (s.fronters||'').trim().toLowerCase() === lower);
}

// ---------- Commission math ----------

function isFiosVbmReferral(s){
  const pipeline = (s.pipeline || '').trim().toLowerCase();
  const source = (s.leadSource || '').trim().toLowerCase();
  return pipeline.includes('fios') && source.includes('vbm referral');
}

function saleLines(s){
  // Units Sold and Notes are parsed separately, then merged product-by-product for the main
  // product: if Notes mentions a product, that count wins for it; if Notes doesn't mention a
  // product at all, whatever Units Sold says for it still counts. BDV New / BDV Winback are
  // counted from Notes only — the dedicated "BVD Lines New/Winback" number fields on the sale
  // are NOT used, since Notes has proven to be the reliable source.
  const lines = [];
  const pushLine = (type, qty) => {
    const rate = settings.rates[type] || 0;
    lines.push({ type, qty, rate, amount: rate * qty });
  };

  const unitsMentions = findProductMentions(s.units || '');
  const notesMentions = findProductMentions(s.notes || '');
  const notesTypes = new Set(notesMentions.map(m => m.type));
  const allMentions = [...notesMentions, ...unitsMentions.filter(m => !notesTypes.has(m.type))];

  const mainMentions = allMentions.filter(m => m.type !== 'BDV New' && m.type !== 'BDV Winback');
  // BDV comes from Notes only — never Units Sold, never the BVD Lines number fields.
  const bdvNewFromNotes = notesMentions.filter(m => m.type === 'BDV New');
  const bdvWinFromNotes = notesMentions.filter(m => m.type === 'BDV Winback');

  if(mainMentions.length){
    mainMentions.forEach(m => pushLine(m.type, m.qty));
  } else if(allMentions.length === 0){
    pushLine(unitTypeOf(s), getQty(s));
  }

  bdvNewFromNotes.forEach(m => pushLine(m.type, m.qty));
  bdvWinFromNotes.forEach(m => pushLine(m.type, m.qty));

  return lines;
}

function commissionForSale(s){
  const lines = saleLines(s);
  let total = lines.reduce((sum,l)=>sum+l.amount, 0);
  const reduced = isFiosVbmReferral(s);
  if(reduced) total = total * 0.75;
  const closerPct = settings.splitCloserPct;
  let closerAmt, fronterAmt;
  if(hasFronter(s)){
    closerAmt = total * (closerPct/100);
    fronterAmt = total * ((100-closerPct)/100);
  } else {
    closerAmt = total;
    fronterAmt = 0;
  }
  return { lines, total, closerAmt, fronterAmt, reduced };
}

function aggregateCommissions(entries){
  const byCloser = {}, byFronter = {};
  let totalCommission = 0, totalUnits = 0, reducedCount = 0;

  entries.forEach(s=>{
    const c = commissionForSale(s);
    const saleQty = c.lines.reduce((sum,l)=>sum+l.qty, 0);
    totalCommission += c.total;
    totalUnits += saleQty;
    if(c.reduced) reducedCount += 1;

    const closerName = s.closers || 'Unassigned';
    if(!byCloser[closerName]) byCloser[closerName] = { amount:0, sales:0, units:0, byType:{} };
    byCloser[closerName].amount += c.closerAmt;
    byCloser[closerName].sales += 1;
    byCloser[closerName].units += saleQty;
    c.lines.forEach(l=>{ byCloser[closerName].byType[l.type] = (byCloser[closerName].byType[l.type]||0) + l.qty; });

    if(hasFronter(s)){
      const fronterName = s.fronters.trim();
      if(!byFronter[fronterName]) byFronter[fronterName] = { amount:0, sales:0, units:0, byType:{} };
      byFronter[fronterName].amount += c.fronterAmt;
      byFronter[fronterName].sales += 1;
      byFronter[fronterName].units += saleQty;
      c.lines.forEach(l=>{ byFronter[fronterName].byType[l.type] = (byFronter[fronterName].byType[l.type]||0) + l.qty; });
    }
  });

  return { totalCommission, totalUnits, byCloser, byFronter, reducedCount };
}

function typeBreakdownStr(byType){
  return Object.entries(byType).sort((a,b)=>b[1]-a[1])
    .map(([type,qty]) => `${qty} ${escapeHtml(type)}`).join(', ');
}

function personRowsHtml(byPerson){
  const entries = Object.entries(byPerson).sort((a,b)=>b[1].amount-a[1].amount);
  if(entries.length === 0) return '<div class="empty">None for this period.</div>';
  return entries.map(([name,v]) => `
    <div class="person-row">
      <div class="p-top">
        <span class="p-name">${escapeHtml(name)}</span>
        <span class="p-amt">${fmtMoney(v.amount)}</span>
      </div>
      <div class="p-sub">${v.sales} sale${v.sales===1?'':'s'} · ${v.units} unit${v.units===1?'':'s'} — ${typeBreakdownStr(v.byType)}</div>
    </div>
  `).join('');
}

// ---------- Rendering ----------

function render(){
  renderStats();
  renderReport();
  renderWeeklyReport();
  renderMonthlyReport();
}

function renderStats(){
  const t = todayStr();
  const todays = filterForAgent(sales.filter(s => s.entryDate === t));
  const { totalCommission } = aggregateCommissions(todays);

  const anchor = document.getElementById('weekAnchor').value || t;
  const { start, end } = getWeekRange(anchor);
  const weekEntries = filterForAgent(sales.filter(s => s.entryDate && s.entryDate >= start && s.entryDate <= end));
  const weekAgg = aggregateCommissions(weekEntries);

  const month = document.getElementById('monthPicker').value || t.slice(0,7);
  const monthEntries = filterForAgent(sales.filter(s => s.entryDate && s.entryDate.startsWith(month)));
  const monthAgg = aggregateCommissions(monthEntries);

  const allAgg = aggregateCommissions(filterForAgent(sales));
  let topEarner = '—';
  let topAmt = -1;
  Object.entries(allAgg.byCloser).forEach(([name,v])=>{
    if(v.amount > topAmt){ topAmt = v.amount; topEarner = name; }
  });

  document.getElementById('statsBar').innerHTML = `
    <div class="stat"><div class="label">Commission today</div><div class="value">${fmtMoney(totalCommission)}</div></div>
    <div class="stat"><div class="label">Commission this week</div><div class="value blue">${fmtMoney(weekAgg.totalCommission)}</div></div>
    <div class="stat"><div class="label">Commission this month</div><div class="value amber">${fmtMoney(monthAgg.totalCommission)}</div></div>
    <div class="stat"><div class="label">Top earner (all time)</div><div class="value" style="font-size:16px;">${escapeHtml(topEarner)}</div></div>
  `;
}

function renderReport(){
  const date = document.getElementById('reportDate').value || todayStr();
  const dayEntries = filterForAgent(sales.filter(s => s.entryDate === date));
  const container = document.getElementById('reportContent');
  if(dayEntries.length === 0){
    container.innerHTML = `<div class="empty">No sales logged on ${date}.</div>`;
    return;
  }
  const agg = aggregateCommissions(dayEntries);
  container.innerHTML = `
    <div style="margin-bottom:14px;font-size:13px;color:var(--text-muted);">
      <b class="mono" style="color:var(--text);font-size:15px;">${fmtMoney(agg.totalCommission)}</b> total commission across
      <b class="mono" style="color:var(--text);">${dayEntries.length}</b> sale(s) on ${date}
      ${agg.reducedCount ? `<br><span style="color:var(--amber);">${agg.reducedCount} sale${agg.reducedCount===1?'':'s'} reduced to 75% (Fios · VBM Referrals)</span>` : ''}
    </div>
    <div class="report-grid">
      <div class="breakdown"><h3>By closer</h3>${personRowsHtml(agg.byCloser)}</div>
      <div class="breakdown"><h3>By fronter</h3>${personRowsHtml(agg.byFronter)}</div>
    </div>
  `;
}

function setReportToday(){
  document.getElementById('reportDate').value = todayStr();
  renderReport();
}

function getWeekRange(anyDateStr){
  const d = new Date((anyDateStr || todayStr()) + 'T00:00:00');
  const day = d.getDay();
  const diffToMonday = (day === 0 ? -6 : 1 - day);
  const monday = new Date(d);
  monday.setDate(d.getDate() + diffToMonday);
  const sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);
  return { start: monday.toISOString().slice(0,10), end: sunday.toISOString().slice(0,10) };
}

function setWeekThisWeek(){
  document.getElementById('weekAnchor').value = todayStr();
  renderWeeklyReport();
  renderStats();
}

function renderWeeklyReport(){
  const anchor = document.getElementById('weekAnchor').value || todayStr();
  const { start, end } = getWeekRange(anchor);
  document.getElementById('weekRangeTag').textContent = `${start} → ${end}`;
  const entries = filterForAgent(sales.filter(s => s.entryDate && s.entryDate >= start && s.entryDate <= end));
  const container = document.getElementById('weeklyReportContent');
  if(entries.length === 0){
    container.innerHTML = `<div class="empty">No sales logged for the week of ${start} – ${end}.</div>`;
    return;
  }
  const agg = aggregateCommissions(entries);
  container.innerHTML = `
    <div style="margin-bottom:14px;font-size:13px;color:var(--text-muted);">
      <b class="mono" style="color:var(--text);font-size:15px;">${fmtMoney(agg.totalCommission)}</b> total commission across
      <b class="mono" style="color:var(--text);">${entries.length}</b> sale(s) for ${start} – ${end}
      ${agg.reducedCount ? `<br><span style="color:var(--amber);">${agg.reducedCount} sale${agg.reducedCount===1?'':'s'} reduced to 75% (Fios · VBM Referrals)</span>` : ''}
    </div>
    <div class="report-grid">
      <div class="breakdown"><h3>By closer</h3>${personRowsHtml(agg.byCloser)}</div>
      <div class="breakdown"><h3>By fronter</h3>${personRowsHtml(agg.byFronter)}</div>
    </div>
  `;
}

function setMonthThisMonth(){
  document.getElementById('monthPicker').value = todayStr().slice(0,7);
  renderMonthlyReport();
  renderStats();
}

function renderMonthlyReport(){
  const month = document.getElementById('monthPicker').value || todayStr().slice(0,7);
  const entries = filterForAgent(sales.filter(s => s.entryDate && s.entryDate.startsWith(month)));
  const container = document.getElementById('monthlyReportContent');
  if(entries.length === 0){
    container.innerHTML = `<div class="empty">No sales logged for ${month}.</div>`;
    return;
  }
  const agg = aggregateCommissions(entries);
  container.innerHTML = `
    <div style="margin-bottom:14px;font-size:13px;color:var(--text-muted);">
      <b class="mono" style="color:var(--text);font-size:15px;">${fmtMoney(agg.totalCommission)}</b> total commission across
      <b class="mono" style="color:var(--text);">${entries.length}</b> sale(s) for ${month}
      ${agg.reducedCount ? `<br><span style="color:var(--amber);">${agg.reducedCount} sale${agg.reducedCount===1?'':'s'} reduced to 75% (Fios · VBM Referrals)</span>` : ''}
    </div>
    <div class="report-grid">
      <div class="breakdown"><h3>By closer</h3>${personRowsHtml(agg.byCloser)}</div>
      <div class="breakdown"><h3>By fronter</h3>${personRowsHtml(agg.byFronter)}</div>
    </div>
  `;
}

// ---------- Copy report as text ----------

function periodLabel(period){
  if(period === 'day'){
    const date = document.getElementById('reportDate').value || todayStr();
    return { title: `Daily Commission Report — ${formatDatePretty(date)}`, entries: filterForAgent(sales.filter(s=>s.entryDate===date)) };
  }
  if(period === 'week'){
    const anchor = document.getElementById('weekAnchor').value || todayStr();
    const { start, end } = getWeekRange(anchor);
    return { title: `Weekly Commission Report — ${formatDatePretty(start)} to ${formatDatePretty(end)}`, entries: filterForAgent(sales.filter(s=>s.entryDate && s.entryDate>=start && s.entryDate<=end)) };
  }
  const month = document.getElementById('monthPicker').value || todayStr().slice(0,7);
  const monthLabel = new Date(month + '-01T00:00:00').toLocaleDateString('en-US', { month:'long', year:'numeric' });
  return { title: `Monthly Commission Report — ${monthLabel}`, entries: filterForAgent(sales.filter(s=>s.entryDate && s.entryDate.startsWith(month))) };
}

function formatDatePretty(dateStr){
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-US', { weekday:'long', month:'short', day:'numeric', year:'numeric' });
}

function copyReport(period){
  const { title, entries } = periodLabel(period);
  const btnId = period === 'day' ? 'copyReportBtn' : (period === 'week' ? 'copyWeeklyBtn' : 'copyMonthlyBtn');

  if(entries.length === 0){
    copyRichReport(`<div>💵 <b>${escapeHtml(title)}</b><br>No sales logged for this period.</div>`,
                   `💵 ${title}\nNo sales logged for this period.`, btnId);
    return;
  }

  const agg = aggregateCommissions(entries);
  const closerList = Object.entries(agg.byCloser).sort((a,b)=>b[1].amount-a[1].amount);
  const fronterList = Object.entries(agg.byFronter).sort((a,b)=>b[1].amount-a[1].amount);

  let html = `<div style="font-family:Calibri,Arial,sans-serif;">`;
  html += `<div>💵 <b>${escapeHtml(title)}</b></div>`;
  html += `<div><b>${fmtMoney(agg.totalCommission)} total commission</b> across ${entries.length} sale${entries.length===1?'':'s'}</div>`;
  if(agg.reducedCount){
    html += `<div style="color:#B8860B;">${agg.reducedCount} sale${agg.reducedCount===1?'':'s'} reduced to 75% (Fios · VBM Referrals)</div>`;
  }
  html += `<br>`;
  html += `<div><b>🏆 By Closer</b></div>`;
  closerList.forEach(([name,v])=>{
    const typeStr = Object.entries(v.byType).sort((a,b)=>b[1]-a[1]).map(([type,qty])=>`${qty} ${escapeHtml(type)}`).join(', ');
    html += `<div>• <b>${escapeHtml(name)}</b> — ${fmtMoney(v.amount)} (${v.sales} sale${v.sales===1?'':'s'} · ${v.units} unit${v.units===1?'':'s'}, <i>${typeStr}</i>)</div>`;
  });
  html += `<br><div><b>🤝 By Fronter</b></div>`;
  if(fronterList.length === 0){
    html += `<div>No fronter-assisted sales this period.</div>`;
  } else {
    fronterList.forEach(([name,v])=>{
      const typeStr = Object.entries(v.byType).sort((a,b)=>b[1]-a[1]).map(([type,qty])=>`${qty} ${escapeHtml(type)}`).join(', ');
      html += `<div>• <b>${escapeHtml(name)}</b> — ${fmtMoney(v.amount)} (${v.sales} sale${v.sales===1?'':'s'} · ${v.units} unit${v.units===1?'':'s'}, <i>${typeStr}</i>)</div>`;
    });
  }
  html += `</div>`;

  let plain = `💵 ${title}\n${fmtMoney(agg.totalCommission)} total commission across ${entries.length} sale${entries.length===1?'':'s'}\n`;
  if(agg.reducedCount){
    plain += `${agg.reducedCount} sale${agg.reducedCount===1?'':'s'} reduced to 75% (Fios · VBM Referrals)\n`;
  }
  plain += `\n`;
  plain += `🏆 By Closer\n`;
  closerList.forEach(([name,v])=>{
    const typeStr = Object.entries(v.byType).sort((a,b)=>b[1]-a[1]).map(([type,qty])=>`${qty} ${type}`).join(', ');
    plain += `• ${name} — ${fmtMoney(v.amount)} (${v.sales} sale${v.sales===1?'':'s'} · ${v.units} unit${v.units===1?'':'s'}, ${typeStr})\n`;
  });
  plain += `\n🤝 By Fronter\n`;
  if(fronterList.length === 0){
    plain += `No fronter-assisted sales this period.\n`;
  } else {
    fronterList.forEach(([name,v])=>{
      const typeStr = Object.entries(v.byType).sort((a,b)=>b[1]-a[1]).map(([type,qty])=>`${qty} ${type}`).join(', ');
      plain += `• ${name} — ${fmtMoney(v.amount)} (${v.sales} sale${v.sales===1?'':'s'} · ${v.units} unit${v.units===1?'':'s'}, ${typeStr})\n`;
    });
  }

  copyRichReport(html, plain, btnId);
}

function copyRichReport(html, plain, btnId){
  btnId = btnId || 'copyReportBtn';
  if(navigator.clipboard && window.ClipboardItem){
    try{
      const item = new ClipboardItem({
        'text/html': new Blob([html], {type:'text/html'}),
        'text/plain': new Blob([plain], {type:'text/plain'})
      });
      navigator.clipboard.write([item]).then(()=>{
        flashCopyStatus('Report copied — paste into Teams.', btnId);
      }).catch(()=>{
        fallbackRichCopy(html, plain, btnId);
      });
      return;
    }catch(e){
      fallbackRichCopy(html, plain, btnId);
      return;
    }
  }
  fallbackRichCopy(html, plain, btnId);
}

function fallbackRichCopy(html, plain, btnId){
  const holder = document.createElement('div');
  holder.contentEditable = 'true';
  holder.style.position = 'fixed';
  holder.style.top = '-9999px';
  holder.style.left = '-9999px';
  holder.innerHTML = html;
  document.body.appendChild(holder);

  const range = document.createRange();
  range.selectNodeContents(holder);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);

  let ok = false;
  try{ ok = document.execCommand('copy'); }catch(e){ ok = false; }
  sel.removeAllRanges();
  document.body.removeChild(holder);

  if(ok){
    flashCopyStatus('Report copied — paste into Teams.', btnId);
  } else {
    showCopyModal(html);
  }
}

function flashCopyStatus(msg, btnId){
  const btn = document.getElementById(btnId || 'copyReportBtn');
  if(!btn) return;
  const original = btn.textContent;
  btn.textContent = msg;
  setTimeout(()=>{ btn.textContent = original; }, 2000);
}

function showCopyModal(html){
  let modal = document.getElementById('copyModal');
  if(modal) modal.remove();
  modal = document.createElement('div');
  modal.id = 'copyModal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px;';
  modal.innerHTML = `
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;max-width:560px;width:100%;">
      <div style="font-size:13px;color:var(--text-muted);margin-bottom:8px;">Auto-copy isn't available here — select all (Ctrl/Cmd+A) inside the box below, copy (Ctrl/Cmd+C), then paste into Teams:</div>
      <div contenteditable="true" style="width:100%;max-height:320px;overflow:auto;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:12px;font-size:13px;line-height:1.5;" id="copyModalText"></div>
      <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:10px;">
        <button class="btn secondary small" onclick="document.getElementById('copyModal').remove()">Close</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
  const box = document.getElementById('copyModalText');
  box.innerHTML = html;
  const range = document.createRange();
  range.selectNodeContents(box);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
}

// ---------- Init ----------

document.getElementById('reportDate').addEventListener('change', renderReport);
document.getElementById('weekAnchor').addEventListener('change', ()=>{ renderWeeklyReport(); renderStats(); });
document.getElementById('monthPicker').addEventListener('change', ()=>{ renderMonthlyReport(); renderStats(); });
document.getElementById('agentFilter').addEventListener('change', render);

document.getElementById('reportDate').value = todayStr();
document.getElementById('weekAnchor').value = todayStr();
document.getElementById('monthPicker').value = todayStr().slice(0,7);

(async function init(){
  await loadSales();
})();

// Pull new team sales automatically every 15 seconds (read-only).
setInterval(() => {
  loadSales(false);
}, 15000);
</script>
