<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Issues Tracker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

:root{
  --bg:#0B1420;
  --surface:#121C2B;
  --surface-2:#1A2740;
  --border:#23324A;
  --text:#E7ECF3;
  --text-muted:#8496B0;
  --accent:#33D6A6;
  --accent-dim:#1E5C4B;
  --amber:#FFB35C;
  --blue:#6C8CFF;
  --danger:#FF6B6B;
  --radius:10px;
}
*{box-sizing:border-box;}
body{margin:0;background:transparent;color:var(--text);font-family:'Inter',sans-serif;font-size:14px;}
#app{max-width:1080px;margin:0 auto;padding:20px;}

h1,h2,h3{font-family:'Space Grotesk',sans-serif;margin:0;}
.mono{font-family:'JetBrains Mono',monospace;}

header.top{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
header.top h1{font-size:22px;letter-spacing:-0.02em;}
header.top .sub{color:var(--text-muted);font-size:12.5px;margin-top:3px;}

.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;}
.stat .label{color:var(--text-muted);font-size:11px;text-transform:uppercase;letter-spacing:.06em;}
.stat .value{font-family:'Space Grotesk',sans-serif;font-size:24px;margin-top:4px;color:var(--accent);}
.stat .value.amber{color:var(--amber);}
.stat .value.red{color:var(--danger);}
.stat .value.blue{color:var(--blue);}

.radar{border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:16px;background:linear-gradient(180deg, rgba(255,107,107,0.06), transparent);}
.radar.quiet{background:var(--surface);}
.radar-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.radar-head h2{font-size:14px;display:flex;align-items:center;gap:8px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--danger);display:inline-block;}
.dot.on{box-shadow:0 0 0 4px rgba(255,107,107,0.18);}
.radar-row{display:flex;gap:8px;flex-wrap:wrap;}
.radar-chip{border:1px solid var(--border);background:var(--surface-2);border-radius:8px;padding:6px 10px;font-size:12px;display:flex;gap:8px;align-items:center;}
.radar-chip .n{font-family:'JetBrains Mono',monospace;font-weight:600;}
.radar-chip.overdue{border-color:var(--danger);color:var(--danger);}
.radar-chip.today{border-color:var(--amber);color:var(--amber);}
.radar-chip.soon{border-color:var(--blue);color:var(--blue);}
.radar-empty{color:var(--text-muted);font-size:12.5px;}

section.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:16px;}
section.card h2{font-size:15px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
section.card h2 .tag{font-size:11px;color:var(--text-muted);font-weight:400;font-family:'Inter';}

form#ticketForm{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
form#ticketForm label{display:flex;flex-direction:column;gap:4px;font-size:11.5px;color:var(--text-muted);}
form#ticketForm label.full{grid-column:1/-1;}
form#ticketForm input,form#ticketForm select,form#ticketForm textarea{background:var(--surface-2);border:1px solid var(--border);border-radius:7px;color:var(--text);padding:8px 9px;font-size:13px;font-family:'Inter';}
form#ticketForm textarea{min-height:56px;resize:vertical;font-family:'Inter';}
form#ticketForm input:focus,form#ticketForm select:focus,form#ticketForm textarea:focus{outline:none;border-color:var(--accent);}

.btn{background:var(--accent);color:#06231b;border:none;border-radius:8px;padding:9px 16px;font-weight:600;font-size:13px;cursor:pointer;font-family:'Inter';}
.btn:hover{filter:brightness(1.08);}
.btn.secondary{background:var(--surface-2);color:var(--text);border:1px solid var(--border);}
.btn.small{padding:5px 10px;font-size:12px;}
.btn.danger{background:transparent;color:var(--danger);border:1px solid var(--danger);}
.btn.amber{background:transparent;color:var(--amber);border:1px solid var(--amber);}

.form-actions{grid-column:1/-1;display:flex;gap:8px;margin-top:4px;}

.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.filters select,.filters input[type=date]{background:var(--surface-2);border:1px solid var(--border);border-radius:7px;color:var(--text);padding:7px 9px;font-size:12.5px;}

.ticket{border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:8px;background:var(--surface-2);border-left:3px solid var(--border);}
.ticket.p-critical{border-left-color:var(--danger);}
.ticket.p-high{border-left-color:var(--amber);}
.ticket.p-medium{border-left-color:var(--blue);}
.ticket.p-low{border-left-color:var(--text-muted);}
.ticket.resolved{opacity:0.55;}
.ticket-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;}
.ticket-top .title{font-weight:600;font-size:14.5px;}
.ticket-top .cat{color:var(--text-muted);font-size:11.5px;margin-left:6px;}
.ticket-actions{display:flex;gap:6px;flex-wrap:wrap;}
.ticket-desc{margin-top:6px;font-size:12.5px;color:var(--text-muted);}
.ticket-meta{display:flex;gap:14px;flex-wrap:wrap;margin-top:8px;font-size:12px;color:var(--text-muted);}
.ticket-meta b{color:var(--text);font-weight:500;}
.pill{display:inline-block;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:2px 10px;font-size:11px;color:var(--text-muted);}
.pill.status-open{border-color:var(--danger);color:var(--danger);}
.pill.status-inprogress{border-color:var(--amber);color:var(--amber);}
.pill.status-resolved{border-color:var(--accent);color:var(--accent);}

.empty{color:var(--text-muted);font-size:13px;text-align:center;padding:24px 0;}

.edit-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px;}
.edit-grid label{display:flex;flex-direction:column;gap:3px;font-size:11px;color:var(--text-muted);}
.edit-grid label.full{grid-column:1/-1;}
.edit-grid input,.edit-grid select,.edit-grid textarea{background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:7px 8px;font-size:12.5px;font-family:'Inter';}
.edit-grid textarea{min-height:50px;resize:vertical;}
.edit-actions{grid-column:1/-1;display:flex;gap:8px;margin-top:2px;}

.notes-box{margin-top:10px;border-top:1px dashed var(--border);padding-top:8px;}
.notes-box .notes-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);margin-bottom:6px;}
.note-item{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;font-size:12.5px;padding:6px 8px;background:var(--surface);border:1px solid var(--border);border-radius:7px;margin-bottom:6px;}
.note-item .note-text{flex:1;white-space:pre-wrap;word-break:break-word;}
.note-item .note-date{display:block;color:var(--text-muted);font-size:10.5px;margin-top:3px;}
.note-item .note-actions{display:flex;gap:4px;flex-shrink:0;}
.note-item .note-actions button{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:11px;padding:2px 4px;}
.note-item .note-actions button:hover{color:var(--text);}
.note-edit-row textarea{width:100%;background:var(--surface-2);border:1px solid var(--accent);border-radius:6px;color:var(--text);padding:6px 8px;font-size:12.5px;font-family:'Inter';min-height:44px;resize:vertical;}
.note-edit-row .note-edit-actions{display:flex;gap:6px;margin-top:5px;}
.note-add-row{display:flex;gap:6px;margin-top:4px;}
.note-add-row textarea{flex:1;background:var(--surface-2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:6px 8px;font-size:12.5px;font-family:'Inter';min-height:36px;resize:vertical;}

.cal-controls{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.cal-controls h3{font-size:14px;min-width:150px;text-align:center;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.cal-dow{font-size:10.5px;color:var(--text-muted);text-align:center;text-transform:uppercase;letter-spacing:.05em;padding-bottom:4px;}
.cal-day{min-height:64px;border:1px solid var(--border);border-radius:7px;padding:5px 6px;font-size:11.5px;position:relative;background:var(--surface-2);cursor:pointer;}
.cal-day.other{opacity:0.3;}
.cal-day.today{border-color:var(--accent);}
.cal-day.selected{border-color:var(--blue);background:rgba(108,140,255,0.08);}
.cal-day .num{color:var(--text-muted);}
.cal-day .dots{display:flex;gap:3px;flex-wrap:wrap;margin-top:4px;}
.cal-day .dot2{width:6px;height:6px;border-radius:50%;}
.cal-day .dot2.overdue,.cal-day .dot2.p-critical{background:var(--danger);}
.cal-day .dot2.p-high{background:var(--amber);}
.cal-day .dot2.p-medium{background:var(--blue);}
.cal-day .dot2.p-low{background:var(--text-muted);}

@media(max-width:680px){
  .stats-bar{grid-template-columns:repeat(2,1fr);}
  form#ticketForm{grid-template-columns:1fr 1fr;}
  .cal-day{min-height:44px;}
}
</style>
</head>
<body>
<div id="app">

  <header class="top">
    <div>
      <h1>Issues Tracker</h1>
      <div class="sub">Tickets, calendar, and daily reminders for Andres</div>
    </div>
    <div id="loadState" class="sub">Loading…</div>
  </header>

  <div class="stats-bar" id="statsBar"></div>

  <div id="radarBox"></div>

  <section class="card">
    <h2>New ticket <span class="tag">issues get assigned to Andres by default</span></h2>
    <form id="ticketForm" onsubmit="return false;">
      <label class="full">Title<input id="f_title" placeholder="What's broken"></label>
      <label class="full">Description<textarea id="f_desc" placeholder="Details, steps to reproduce, impact"></textarea></label>
      <label>Category<input id="f_category" placeholder="e.g. Billing, Install, App"></label>
      <label>Priority
        <select id="f_priority">
          <option value="critical">Critical</option>
          <option value="high" selected>High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>
      </label>
      <label>Assignee<input id="f_assignee" value="Andres"></label>
      <label>Reported by<input id="f_reporter" placeholder="Your name"></label>
      <label>Due date<input id="f_due" type="date"></label>
      <label>Reported date<input id="f_reported" type="date"></label>
      <div class="form-actions">
        <button class="btn" onclick="addTicket()">Create ticket</button>
        <button class="btn secondary" onclick="clearForm()">Clear form</button>
        <button class="btn secondary" onclick="refreshFromTeam()">Refresh (pull latest)</button>
      </div>
    </form>
  </section>

  <section class="card">
    <h2>Tickets <span class="tag" id="ticketTag"></span></h2>
    <div class="filters">
      <select id="filterStatus">
        <option value="">All statuses</option>
        <option value="open">Open</option>
        <option value="inprogress">In progress</option>
        <option value="resolved">Resolved</option>
      </select>
      <select id="filterAssignee">
        <option value="">All assignees</option>
      </select>
      <select id="filterPriority">
        <option value="">All priorities</option>
        <option value="critical">Critical</option>
        <option value="high">High</option>
        <option value="medium">Medium</option>
        <option value="low">Low</option>
      </select>
      <button class="btn secondary small" onclick="clearFilters()">Reset filters</button>
    </div>
    <div id="ticketList"></div>
  </section>

  <section class="card">
    <h2>Calendar</h2>
    <div class="cal-controls">
      <button class="btn secondary small" onclick="calShift(-1)">‹</button>
      <h3 id="calLabel"></h3>
      <button class="btn secondary small" onclick="calShift(1)">›</button>
      <button class="btn secondary small" onclick="calToday()">Today</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </section>

</div>

<script>
let tickets = [];
let calView = new Date();
let selectedDay = null;
let editingId = null;
let editingNoteKey = null;
let addingNoteFor = null;

function todayStr(){ return new Date().toISOString().slice(0,10); }
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

function daysBetween(a,b){
  const d1 = new Date(a+'T00:00:00'), d2 = new Date(b+'T00:00:00');
  return Math.round((d2-d1)/86400000);
}

// Google Apps Script backend configuration
const API_URL = 'https://script.google.com/macros/s/AKfycbx4RKL06my2OT9jlE9i0B6izIoci7DmY8A-hDj_uIjo_KzwO8DwT4Et3z-YVWzKNYT9Aw/exec';
const API_KEY = 'andres-issues-2026'; // must match API_KEY in Code.gs

let isSyncing = false;

async function loadTickets(showLoading = true){
  const loadState = document.getElementById('loadState');
  if(showLoading && loadState){
    loadState.textContent = 'Loading…';
  }
  try{
    const url = `${API_URL}?action=list&key=${encodeURIComponent(API_KEY)}&_=${Date.now()}`;
    const response = await fetch(url, { method:'GET', redirect:'follow', cache:'no-store' });
    if(!response.ok) throw new Error(`HTTP ${response.status}`);
    const data = await response.json();
    if(!data.success) throw new Error(data.error || 'Could not load tickets');
    tickets = Array.isArray(data.tickets) ? data.tickets : [];
    if(loadState) loadState.textContent = '';
  }catch(e){
    console.error('Load failed', e);
    if(loadState) loadState.textContent = `Load failed: ${e.message}`;
  }
  if(!document.getElementById('f_reported').value){
    document.getElementById('f_reported').value = todayStr();
  }
  render();
}

async function saveTickets(){
  if(isSyncing) return;
  isSyncing = true;
  const loadState = document.getElementById('loadState');
  try{
    const response = await fetch(API_URL, {
      method:'POST',
      redirect:'follow',
      body: JSON.stringify({ key: API_KEY, action: 'sync', tickets })
    });
    if(!response.ok) throw new Error(`HTTP ${response.status}`);
    const data = await response.json();
    if(!data.success) throw new Error(data.error || 'Save failed');
  }catch(e){
    console.error('Save failed', e);
    if(loadState) loadState.textContent = `Save failed: ${e.message}`;
    alert(`Changes were not saved to Google Sheets.\n\n${e.message}`);
  }finally{
    isSyncing = false;
  }
}

async function refreshFromTeam(){
  await loadTickets(true);
}

function clearForm(){
  ['title','category','reporter','due'].forEach(k=>{
    const el = document.getElementById('f_'+k);
    if(el) el.value = '';
  });
  document.getElementById('f_desc').value = '';
  document.getElementById('f_priority').value = 'high';
  document.getElementById('f_assignee').value = 'Andres';
  document.getElementById('f_reported').value = todayStr();
}

async function addTicket(){
  const title = document.getElementById('f_title').value.trim();
  if(!title){
    alert('Give the ticket a title.');
    return;
  }
  const entry = {
    id: uid(),
    title,
    description: document.getElementById('f_desc').value.trim(),
    category: document.getElementById('f_category').value.trim(),
    priority: document.getElementById('f_priority').value,
    assignee: document.getElementById('f_assignee').value.trim() || 'Andres',
    reporter: document.getElementById('f_reporter').value.trim(),
    reportedDate: document.getElementById('f_reported').value || todayStr(),
    dueDate: document.getElementById('f_due').value,
    status: 'open',
    resolvedDate: null,
    notes: []
  };
  tickets.push(entry);
  await saveTickets();
  clearForm();
  render();
}

async function setStatus(id, status){
  const t = tickets.find(x=>x.id===id);
  if(!t) return;
  t.status = status;
  t.resolvedDate = status === 'resolved' ? todayStr() : null;
  await saveTickets();
  render();
}

async function deleteTicket(id){
  tickets = tickets.filter(t => t.id !== id);
  await saveTickets();
  render();
}

function editTicket(id){
  editingId = id;
  addingNoteFor = null;
  editingNoteKey = null;
  renderTicketList();
}

function cancelEditTicket(){
  editingId = null;
  renderTicketList();
}

async function saveTicketEdit(id){
  const t = tickets.find(x=>x.id===id);
  if(!t) return;
  const title = document.getElementById('e_title_'+id).value.trim();
  if(!title){
    alert('Give the ticket a title.');
    return;
  }
  t.title = title;
  t.description = document.getElementById('e_desc_'+id).value.trim();
  t.category = document.getElementById('e_category_'+id).value.trim();
  t.priority = document.getElementById('e_priority_'+id).value;
  t.assignee = document.getElementById('e_assignee_'+id).value.trim() || 'Andres';
  t.reporter = document.getElementById('e_reporter_'+id).value.trim();
  t.dueDate = document.getElementById('e_due_'+id).value;
  t.status = document.getElementById('e_status_'+id).value;
  t.resolvedDate = t.status === 'resolved' ? (t.resolvedDate || todayStr()) : null;
  editingId = null;
  await saveTickets();
  render();
}

function startAddNote(id){
  addingNoteFor = id;
  editingNoteKey = null;
  renderTicketList();
}

function cancelAddNote(){
  addingNoteFor = null;
  renderTicketList();
}

async function saveNewNote(id){
  const t = tickets.find(x=>x.id===id);
  if(!t) return;
  const box = document.getElementById('newNoteText_'+id);
  const text = box ? box.value.trim() : '';
  if(!text) return;
  if(!t.notes) t.notes = [];
  t.notes.push({ id: uid(), text, date: new Date().toISOString() });
  addingNoteFor = null;
  await saveTickets();
  render();
}

function startEditNote(ticketId, noteId){
  editingNoteKey = ticketId + '::' + noteId;
  addingNoteFor = null;
  renderTicketList();
}

function cancelEditNote(){
  editingNoteKey = null;
  renderTicketList();
}

async function saveEditNote(ticketId, noteId){
  const t = tickets.find(x=>x.id===ticketId);
  if(!t || !t.notes) return;
  const note = t.notes.find(n=>n.id===noteId);
  if(!note) return;
  const box = document.getElementById('noteEdit_'+ticketId+'_'+noteId);
  const text = box ? box.value.trim() : '';
  if(!text) return;
  note.text = text;
  note.date = new Date().toISOString();
  editingNoteKey = null;
  await saveTickets();
  render();
}

async function deleteNote(ticketId, noteId){
  const t = tickets.find(x=>x.id===ticketId);
  if(!t || !t.notes) return;
  t.notes = t.notes.filter(n=>n.id!==noteId);
  await saveTickets();
  render();
}

function formatNoteDate(iso){
  try{
    const d = new Date(iso);
    return d.toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
  }catch(e){
    return '';
  }
}

function escapeHtml(str){
  if(!str) return '';
  return str.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function render(){
  populateAssigneeFilter();
  renderStats();
  renderRadar();
  renderTicketList();
  renderCalendar();
}

function populateAssigneeFilter(){
  const sel = document.getElementById('filterAssignee');
  const current = sel.value;
  const names = Array.from(new Set(tickets.map(t=>t.assignee).filter(Boolean))).sort();
  sel.innerHTML = '<option value="">All assignees</option>' + names.map(n=>`<option value="${escapeHtml(n)}">${escapeHtml(n)}</option>`).join('');
  sel.value = current;
}

function renderStats(){
  const t = todayStr();
  const open = tickets.filter(x=>x.status!=='resolved');
  const overdue = open.filter(x=>x.dueDate && x.dueDate < t);
  const dueToday = open.filter(x=>x.dueDate === t);
  const resolvedToday = tickets.filter(x=>x.resolvedDate === t);

  document.getElementById('statsBar').innerHTML = `
    <div class="stat"><div class="label">Open tickets</div><div class="value">${open.length}</div></div>
    <div class="stat"><div class="label">Overdue</div><div class="value red">${overdue.length}</div></div>
    <div class="stat"><div class="label">Due today</div><div class="value amber">${dueToday.length}</div></div>
    <div class="stat"><div class="label">Resolved today</div><div class="value blue">${resolvedToday.length}</div></div>
  `;
}

function renderRadar(){
  const t = todayStr();
  const andresOpen = tickets.filter(x => x.status!=='resolved' && (x.assignee||'').toLowerCase() === 'andres');
  const overdue = andresOpen.filter(x=>x.dueDate && x.dueDate < t);
  const dueToday = andresOpen.filter(x=>x.dueDate === t);
  const soon = andresOpen.filter(x=>x.dueDate && x.dueDate > t && daysBetween(t, x.dueDate) <= 7);

  const hasAny = overdue.length || dueToday.length || soon.length;
  const box = document.getElementById('radarBox');
  box.innerHTML = `
    <div class="radar ${hasAny ? '' : 'quiet'}">
      <div class="radar-head">
        <h2><span class="dot ${hasAny?'on':''}"></span>Reminders for Andres</h2>
      </div>
      ${hasAny ? `
        <div class="radar-row">
          ${overdue.length ? `<div class="radar-chip overdue"><span class="n">${overdue.length}</span> overdue: ${overdue.map(x=>escapeHtml(x.title)).slice(0,4).join(', ')}${overdue.length>4?'…':''}</div>`:''}
          ${dueToday.length ? `<div class="radar-chip today"><span class="n">${dueToday.length}</span> due today: ${dueToday.map(x=>escapeHtml(x.title)).slice(0,4).join(', ')}${dueToday.length>4?'…':''}</div>`:''}
          ${soon.length ? `<div class="radar-chip soon"><span class="n">${soon.length}</span> due this week</div>`:''}
        </div>
      ` : `<div class="radar-empty">Nothing overdue or due soon for Andres — clear board.</div>`}
    </div>
  `;
}

function notesSection(t){
  const notes = t.notes || [];
  const rows = notes.slice().reverse().map(n=>{
    if(editingNoteKey === t.id+'::'+n.id){
      return `
        <div class="note-edit-row">
          <textarea id="noteEdit_${t.id}_${n.id}">${escapeHtml(n.text)}</textarea>
          <div class="note-edit-actions">
            <button class="btn small" onclick="saveEditNote('${t.id}','${n.id}')">Save</button>
            <button class="btn secondary small" onclick="cancelEditNote()">Cancel</button>
          </div>
        </div>
      `;
    }
    return `
      <div class="note-item">
        <div class="note-text">${escapeHtml(n.text)}<span class="note-date">${formatNoteDate(n.date)}</span></div>
        <div class="note-actions">
          <button onclick="startEditNote('${t.id}','${n.id}')" title="Edit note">Edit</button>
          <button onclick="deleteNote('${t.id}','${n.id}')" title="Delete note">✕</button>
        </div>
      </div>
    `;
  }).join('');

  const addRow = addingNoteFor === t.id ? `
    <div class="note-add-row">
      <textarea id="newNoteText_${t.id}" placeholder="Add a note — progress, blockers, next steps"></textarea>
      <button class="btn small" onclick="saveNewNote('${t.id}')">Add</button>
      <button class="btn secondary small" onclick="cancelAddNote()">Cancel</button>
    </div>
  ` : `<button class="btn secondary small" onclick="startAddNote('${t.id}')">Add note</button>`;

  return `
    <div class="notes-box">
      <div class="notes-label">Notes ${notes.length ? '('+notes.length+')' : ''}</div>
      ${rows}
      ${addRow}
    </div>
  `;
}

function ticketEditForm(t){
  return `
    <div class="ticket p-${t.priority}">
      <div class="edit-grid">
        <label class="full">Title<input id="e_title_${t.id}" value="${escapeHtml(t.title)}"></label>
        <label class="full">Description<textarea id="e_desc_${t.id}">${escapeHtml(t.description||'')}</textarea></label>
        <label>Category<input id="e_category_${t.id}" value="${escapeHtml(t.category||'')}"></label>
        <label>Priority
          <select id="e_priority_${t.id}">
            <option value="critical" ${t.priority==='critical'?'selected':''}>Critical</option>
            <option value="high" ${t.priority==='high'?'selected':''}>High</option>
            <option value="medium" ${t.priority==='medium'?'selected':''}>Medium</option>
            <option value="low" ${t.priority==='low'?'selected':''}>Low</option>
          </select>
        </label>
        <label>Status
          <select id="e_status_${t.id}">
            <option value="open" ${t.status==='open'?'selected':''}>Open</option>
            <option value="inprogress" ${t.status==='inprogress'?'selected':''}>In progress</option>
            <option value="resolved" ${t.status==='resolved'?'selected':''}>Resolved</option>
          </select>
        </label>
        <label>Assignee<input id="e_assignee_${t.id}" value="${escapeHtml(t.assignee||'')}"></label>
        <label>Reported by<input id="e_reporter_${t.id}" value="${escapeHtml(t.reporter||'')}"></label>
        <label>Due date<input id="e_due_${t.id}" type="date" value="${t.dueDate||''}"></label>
        <div class="edit-actions">
          <button class="btn" onclick="saveTicketEdit('${t.id}')">Save changes</button>
          <button class="btn secondary" onclick="cancelEditTicket()">Cancel</button>
        </div>
      </div>
      ${notesSection(t)}
    </div>
  `;
}

function ticketCard(t){
  if(editingId === t.id){
    return ticketEditForm(t);
  }
  const overdue = t.status !== 'resolved' && t.dueDate && t.dueDate < todayStr();
  const statusClass = t.status === 'inprogress' ? 'status-inprogress' : (t.status === 'resolved' ? 'status-resolved' : 'status-open');
  const statusLabel = t.status === 'inprogress' ? 'In progress' : (t.status === 'resolved' ? 'Resolved' : 'Open');
  return `
    <div class="ticket p-${t.priority} ${t.status==='resolved'?'resolved':''}">
      <div class="ticket-top">
        <div>
          <span class="title">${escapeHtml(t.title)}</span>
          ${t.category ? `<span class="cat">${escapeHtml(t.category)}</span>` : ''}
        </div>
        <div class="ticket-actions">
          <span class="pill ${statusClass}">${statusLabel}</span>
          ${t.status !== 'inprogress' && t.status !== 'resolved' ? `<button class="btn amber small" onclick="setStatus('${t.id}','inprogress')">Start</button>` : ''}
          ${t.status !== 'resolved' ? `<button class="btn small" onclick="setStatus('${t.id}','resolved')">Resolve</button>` : `<button class="btn secondary small" onclick="setStatus('${t.id}','open')">Reopen</button>`}
          <button class="btn secondary small" onclick="editTicket('${t.id}')">Edit</button>
          <button class="btn danger small" onclick="deleteTicket('${t.id}')">Remove</button>
        </div>
      </div>
      ${t.description ? `<div class="ticket-desc">${escapeHtml(t.description)}</div>` : ''}
      <div class="ticket-meta">
        <span>Assignee: <b>${escapeHtml(t.assignee||'Unassigned')}</b></span>
        ${t.reporter ? `<span>Reported by: <b>${escapeHtml(t.reporter)}</b></span>` : ''}
        ${t.dueDate ? `<span style="${overdue?'color:var(--danger)':''}">Due <b>${t.dueDate}</b>${overdue?' · overdue':''}</span>` : ''}
        <span class="pill">${t.priority}</span>
        ${t.reportedDate ? `<span class="mono">Reported ${t.reportedDate}</span>` : ''}
      </div>
      ${notesSection(t)}
    </div>
  `;
}

function renderTicketList(){
  const fStatus = document.getElementById('filterStatus').value;
  const fAssignee = document.getElementById('filterAssignee').value;
  const fPriority = document.getElementById('filterPriority').value;

  let list = tickets.slice();
  if(selectedDay){
    list = list.filter(t => t.dueDate === selectedDay);
  }
  if(fStatus) list = list.filter(t => t.status === fStatus);
  if(fAssignee) list = list.filter(t => t.assignee === fAssignee);
  if(fPriority) list = list.filter(t => t.priority === fPriority);

  const order = {critical:0,high:1,medium:2,low:3};
  list.sort((a,b)=>{
    if(a.status==='resolved' && b.status!=='resolved') return 1;
    if(b.status==='resolved' && a.status!=='resolved') return -1;
    return (order[a.priority]??9) - (order[b.priority]??9);
  });

  document.getElementById('ticketTag').textContent = selectedDay ? `due ${selectedDay}` : `${tickets.length} total`;
  const container = document.getElementById('ticketList');
  if(list.length === 0){
    container.innerHTML = '<div class="empty">No tickets match this view.</div>';
    return;
  }
  container.innerHTML = list.map(ticketCard).join('');
}

function clearFilters(){
  document.getElementById('filterStatus').value = '';
  document.getElementById('filterAssignee').value = '';
  document.getElementById('filterPriority').value = '';
  selectedDay = null;
  renderTicketList();
  renderCalendar();
}

function calShift(n){
  calView.setMonth(calView.getMonth()+n);
  renderCalendar();
}
function calToday(){
  calView = new Date();
  selectedDay = null;
  renderCalendar();
  renderTicketList();
}

function renderCalendar(){
  const year = calView.getFullYear();
  const month = calView.getMonth();
  document.getElementById('calLabel').textContent = calView.toLocaleDateString('en-US',{month:'long',year:'numeric'});

  const first = new Date(year, month, 1);
  const startOffset = first.getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const daysInPrevMonth = new Date(year, month, 0).getDate();
  const t = todayStr();

  const dows = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  let html = dows.map(d=>`<div class="cal-dow">${d}</div>`).join('');

  const cells = [];
  for(let i=startOffset-1;i>=0;i--){
    cells.push({num: daysInPrevMonth-i, other:true, dateStr:null});
  }
  for(let d=1; d<=daysInMonth; d++){
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    cells.push({num:d, other:false, dateStr});
  }
  while(cells.length % 7 !== 0){
    cells.push({num: cells.length - (startOffset+daysInMonth) + 1, other:true, dateStr:null});
  }

  cells.forEach(c=>{
    let dotsHtml = '';
    let classes = 'cal-day';
    if(c.other) classes += ' other';
    if(c.dateStr === t) classes += ' today';
    if(c.dateStr && c.dateStr === selectedDay) classes += ' selected';
    if(c.dateStr){
      const dayTickets = tickets.filter(x => x.dueDate === c.dateStr && x.status !== 'resolved');
      dotsHtml = dayTickets.slice(0,6).map(x=>`<span class="dot2 p-${x.priority}"></span>`).join('');
    }
    html += `<div class="${classes}" ${c.dateStr?`onclick="selectDay('${c.dateStr}')"`:''}>
      <div class="num">${c.num}</div>
      <div class="dots">${dotsHtml}</div>
    </div>`;
  });

  document.getElementById('calGrid').innerHTML = html;
}

function selectDay(dateStr){
  selectedDay = (selectedDay === dateStr) ? null : dateStr;
  renderCalendar();
  renderTicketList();
}

document.getElementById('filterStatus').addEventListener('change', renderTicketList);
document.getElementById('filterAssignee').addEventListener('change', renderTicketList);
document.getElementById('filterPriority').addEventListener('change', renderTicketList);

loadTickets();

setInterval(() => {
  loadTickets(false);
}, 15000);
</script>
